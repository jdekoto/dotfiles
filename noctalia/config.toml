[audio]
enable_sounds = true

[backdrop]
blur_intensity = 0.53999998793005943
enabled = true

[bar]
order = [ "default" ]

    [bar.default]
    auto_hide = true
    background_opacity = 0.72999998368322849
    capsule = true
    capsule_opacity = 0.55000000000000004
    center = [ "group:g3", "launcher" ]
    end = [ "group:g2", "group:g1" ]
    font_family = "Adwaita Sans"
    layer = "overlay"
    margin_edge = 0
    margin_ends = 16
    padding = 5
    position = "bottom"
    radius_bottom_left = -80
    radius_bottom_right = -80
    radius_top_left = 20
    radius_top_right = 20
    reserve_space = false
    shadow = false
    start = [ "wallpaper", "workspaces" ]

        [[bar.default.capsule_group]]
        fill = "surface_variant"
        id = "g1"
        members = [ "notifications", "bluetooth", "network", "volume", "battery", "session" ]
        opacity = 0.55000001192092896
        padding = 6.0

        [[bar.default.capsule_group]]
        fill = "surface_variant"
        id = "g2"
        members = [ "media", "recorder", "clipboard" ]
        opacity = 0.55000001192092896
        padding = 6.0

        [[bar.default.capsule_group]]
        fill = "surface_variant"
        id = "g3"
        members = [ "clock", "weather" ]
        opacity = 0.55000001192092896
        padding = 6.0

[battery.device."/org/freedesktop/UPower/devices/headset_dev_08_EB_ED_27_30_AF"]
warning_threshold = 0

[control_center]
sidebar = "none"
sidebar_section = "none"

[desktop_widgets]
enabled = false
schema_version = 2
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[dock]
auto_hide = true
background_opacity = 0.69999998435378075
icon_size = 25
launcher_position = "end"
show_dots = true

[keybinds]
cancel = [ "Escape" ]
down = [ "Down" ]
left = [ "Left" ]
right = [ "Right" ]
up = [ "Up" ]
validate = [ "Return" ]

[location]
auto_locate = true

[lockscreen]
blurred_desktop = true
fingerprint = false
wallpaper = "/run/media/dytu/EXTERNAL/Pictures/Sky/2325290_4.jpg"

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [
    "lockscreen-login-box@eDP-1",
    "lockscreen-widget-0000000000000003",
    "lockscreen-widget-0000000000000004",
    "lockscreen-widget-0000000000000005"
]

    [lockscreen_widgets.grid]
    cell_size = 32
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 0.0
    box_width = 0.0
    cx = 1065.0
    cy = 697.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000003]
    box_height = 128.0
    box_width = 320.0
    cx = 203.0
    cy = 672.0
    output = "eDP-1"
    rotation = 0.0
    type = "media_player"

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000004]
    box_height = 144.0
    box_width = 192.0
    cx = 139.0
    cy = 102.0
    output = "eDP-1"
    rotation = 0.0
    type = "clock"

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000005]
    box_height = 0.0
    box_width = 0.0
    cx = 1195.0
    cy = 88.0
    output = "eDP-1"
    rotation = 0.0
    type = "audio_visualizer"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000005.settings]
        aspect_ratio = 2.5
        bands = 32
        show_when_idle = true

[nightlight]
enabled = true

[notification]
layer = "overlay"
offset_x = 15
offset_y = 10
position = "bottom_right"

[osd]
background_opacity = 0.72999999999999998
offset_x = 15
offset_y = 10
position = "bottom_right"

[plugin_settings."noctalia/screen_recorder"]
audio_codec = "aac"
copy_to_clipboard = true
directory = "~/Videos"

[plugins]
enabled = [ "noctalia/screen_recorder" ]

[shell]
avatar_path = "/home/dytu/Pictures/Sky/2325290_2.jpg"
font_family = "Adwaita Sans"
launch_apps_as_systemd_services = true
niri_overview_type_to_launch_enabled = true
settings_show_advanced = true

    [shell.panel]
    clipboard_placement = "attached"
    launcher_categories = false
    launcher_compact = true
    launcher_placement = "attached"
    shadow = false
    transparency_mode = "glass"

    [shell.screen_corners]
    size = 82

    [shell.screenshot]
    directory = "~/Pictures/Screenshots"

[system.monitor]
enabled = false

[theme]
builtin = "Noctalia"
community_palette = "ADW"
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "m3-content"

    [theme.templates]
    builtin_ids = [ "alacritty", "btop", "cava", "gtk3", "gtk4", "niri" ]
    community_ids = [ "neovim", "yazi" ]

[wallpaper]
directory = "/run/media/dytu/EXTERNAL/Pictures/Sky"
directory_dark = "/run/media/dytu/EXTERNAL/Pictures/Sky"
directory_light = "/run/media/dytu/EXTERNAL/Pictures/Sky"
edge_smoothness = 0.0
transition = [ "disc" ]
transition_duration = 1800
transition_on_startup = true

    [wallpaper.default]
    path = "/run/media/dytu/EXTERNAL/Pictures/Sky/2325290_2.jpg"

    [wallpaper.last]
    path = "/run/media/dytu/EXTERNAL/Pictures/Sky/2325290_2.jpg"

    [wallpaper.monitors.eDP-1]
    path = "/run/media/dytu/EXTERNAL/Pictures/Sky/2325290_2.jpg"

    [[wallpaper.favorite]]
    palette_source = "wallpaper"
    path = "/run/media/dytu/EXTERNAL/Pictures/Sky/2325290_1.jpg"
    theme_mode = "dark"
    wallpaper_scheme = "m3-content"

    [[wallpaper.favorite]]
    palette_source = "wallpaper"
    path = "/run/media/dytu/EXTERNAL/Pictures/Sky/2325290_2.jpg"
    theme_mode = "dark"
    wallpaper_scheme = "m3-content"

[widget.battery]
hide_when_plugged = true
show_label = false

[widget.media]
album_art_only = true
hide_when_no_media = true

[widget.network]
show_label = false

[widget.recorder]
type = "noctalia/screen_recorder:recorder"

[widget.volume]
show_label = false

[widget.weather]
font_family = "Adwaita Sans"
show_condition = false
